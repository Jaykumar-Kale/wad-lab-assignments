<!doctype html>
<html>
  <head>
    <title>Employee Directory</title>

    <style>
      .container {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
      }

      .card {
        border: 1px solid black;
        padding: 10px;
        width: 200px;
        text-align: center;
      }

      img {
        width: 100%;
      }
    </style>
  </head>

  <body>
    <h2>Employee Directory</h2>

    <div id="employees" class="container"></div>

    <script>
      fetch("http://localhost:3000/employees")
        .then((res) => res.json())
        .then((data) => {
          let container = document.getElementById("employees");

          data.forEach((emp) => {
            let div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
            <img src="${emp.image}">
            <h4>${emp.name}</h4>
            <p>${emp.designation}</p>
            <p>${emp.department}</p>
            <p>₹${emp.salary}</p>
        `;

            container.appendChild(div);
          });
        });
    </script>
  </body>
</html>
