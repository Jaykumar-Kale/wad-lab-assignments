<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>College Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-primary px-3 d-flex justify-content-between">
    <div>
        <button class="btn btn-light btn-sm me-2" id="toggleBtn">
            <i class="bi bi-list"></i>
        </button>
        <span class="navbar-brand mb-0 h1">College Dashboard</span>
    </div>

    <div>
        <button class="btn btn-dark btn-sm me-2" id="darkModeBtn">
            <i class="bi bi-moon"></i>
        </button>
        <button class="btn btn-danger btn-sm" onclick="logout()">
            <i class="bi bi-box-arrow-right"></i>
        </button>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <div id="sidebar" class="col-md-3 bg-dark text-white min-vh-100 p-3">
            <h4 class="text-center mb-4">Admin Panel</h4>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link text-white active bg-primary rounded" href="#">
                        <i class="bi bi-speedometer2 me-2"></i>Dashboard
                    </a>
                </li>
            </ul>
        </div>

        <div id="mainContent" class="col-md-9 p-4">

            <h2 class="mb-4">Dashboard Overview</h2>

            <div class="row">

                <div class="col-sm-6 col-md-3 mb-4">
                    <div class="card text-center shadow dashboard-card">
                        <div class="card-body">
                            <h5>Total Students</h5>
                            <p class="fs-4 fw-bold" id="students">0</p>
                        </div>
                    </div>
                </div>

                <div class="col-sm-6 col-md-3 mb-4">
                    <div class="card text-center shadow dashboard-card">
                        <div class="card-body">
                            <h5>Total Faculty</h5>
                            <p class="fs-4 fw-bold" id="faculty">0</p>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Chart -->
            <div class="card shadow p-3">
                <h5>Monthly Exam Statistics</h5>
                <canvas id="myChart"></canvas>
            </div>

        </div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
