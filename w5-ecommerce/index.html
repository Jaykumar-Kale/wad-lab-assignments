<!doctype html>
<html>
  <head>
    <title>E-Commerce</title>

    <!-- Bootstrap CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container">
      <h2 class="text-center my-4">Product Listing</h2>

      <!-- Dropdown Filter -->
      <div class="dropdown mb-3">
        <button
          class="btn btn-primary dropdown-toggle"
          data-bs-toggle="dropdown"
        >
          Select Category
        </button>

        <ul class="dropdown-menu">
          <li><a class="dropdown-item" href="#">All</a></li>
          <li><a class="dropdown-item" href="#">Electronics</a></li>
          <li><a class="dropdown-item" href="#">Clothing</a></li>
        </ul>
      </div>

      <!-- Grid Layout -->
      <div class="row">
        <!-- Card 1 -->
        <div class="col-md-4">
          <div class="card">
            <img src="https://via.placeholder.com/200" class="card-img-top" />

            <div class="card-body">
              <h5 class="card-title">Headphones</h5>
              <p class="card-text">Noise cancelling</p>
              <p>₹7999</p>
            </div>
          </div>
        </div>

        <!-- Card 2 -->
        <div class="col-md-4">
          <div class="card">
            <img src="https://via.placeholder.com/200" class="card-img-top" />

            <div class="card-body">
              <h5 class="card-title">Watch</h5>
              <p class="card-text">Smart watch</p>
              <p>₹12999</p>
            </div>
          </div>
        </div>

        <!-- Card 3 -->
        <div class="col-md-4">
          <div class="card">
            <img src="https://via.placeholder.com/200" class="card-img-top" />

            <div class="card-body">
              <h5 class="card-title">Shoes</h5>
              <p class="card-text">Running shoes</p>
              <p>₹2999</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
