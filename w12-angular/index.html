<!doctype html>
<html>
  <head>
    <title>Angular Todo</title>

    <!-- Angular CDN -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  </head>

  <body ng-app="myApp" ng-controller="myCtrl">
    <h2>Angular To-Do List</h2>

    <input type="text" ng-model="task" placeholder="Enter task" />
    <button ng-click="addTask()">Add</button>

    <ul>
      <li ng-repeat="t in tasks">
        {{t}}

        <button ng-click="editTask($index)">Edit</button>
        <button ng-click="deleteTask($index)">Delete</button>
      </li>
    </ul>

    <script>
      var app = angular.module("myApp", []);

      app.controller("myCtrl", function ($scope) {
        $scope.tasks = [];

        // Add
        $scope.addTask = function () {
          if ($scope.task) {
            $scope.tasks.push($scope.task);
            $scope.task = "";
          }
        };

        // Delete
        $scope.deleteTask = function (index) {
          $scope.tasks.splice(index, 1);
        };

        // Edit
        $scope.editTask = function (index) {
          let updated = prompt("Edit task:", $scope.tasks[index]);
          if (updated) {
            $scope.tasks[index] = updated;
          }
        };
      });
    </script>
  </body>
</html>
