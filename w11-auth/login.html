<!doctype html>
<html>
  <head>
    <title>Login</title>
  </head>

  <body>
    <h2>Login</h2>

    <form onsubmit="loginUser(event)">
      <input id="loginUser" placeholder="Username" required />
      <input id="loginPass" type="password" placeholder="Password" required />

      <button type="submit">Login</button>
    </form>

    <script src="script.js"></script>
  </body>
</html>
