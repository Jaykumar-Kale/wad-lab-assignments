<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">User Registration Form</h2>

    <div class="card p-4 shadow">

        <input type="text" id="fullName" class="form-control mb-3" placeholder="Full Name" required>

        <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>

        <input type="text" id="username" class="form-control mb-3" placeholder="Username" required>

        <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>

        <button class="btn btn-primary w-100" onclick="submitForm()">Register</button>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
