<!doctype html>
<html>
  <head>
    <title>Facebook Page</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body style="background: #f0f2f5">
    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-primary px-3">
      <span class="navbar-brand">facebook</span>

      <form class="d-flex">
        <input class="form-control me-2" placeholder="Email" />
        <input class="form-control me-2" placeholder="Password" />
        <button class="btn btn-light">Login</button>
      </form>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="container mt-5">
      <div class="row">
        <!-- LEFT SIDE -->
        <div class="col-md-6">
          <h3>Facebook helps you connect and share with people.</h3>
          <img src="https://via.placeholder.com/400" class="img-fluid" />
        </div>

        <!-- RIGHT SIDE -->
        <div class="col-md-6">
          <h2>Create an Account</h2>
          <p>It's free and always will be.</p>

          <form>
            <div class="row mb-2">
              <div class="col">
                <input class="form-control" placeholder="First name" />
              </div>
              <div class="col">
                <input class="form-control" placeholder="Last name" />
              </div>
            </div>

            <input class="form-control mb-2" placeholder="Email" />
            <input class="form-control mb-2" placeholder="Re-enter Email" />
            <input class="form-control mb-2" placeholder="Password" />

            <input type="date" class="form-control mb-2" />

            <div class="mb-2">
              <input type="radio" /> Male <input type="radio" /> Female
            </div>

            <button class="btn btn-success w-100">Sign Up</button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
