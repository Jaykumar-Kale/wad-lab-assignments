<!doctype html>
<html>
  <head>
    <title>Register</title>
  </head>

  <body>
    <h2>Registration</h2>

    <form onsubmit="registerUser(event)">
      <input id="name" placeholder="Name" required /><br />
      <input id="email" type="email" placeholder="Email" required /><br />
      <input
        id="mobile"
        placeholder="Mobile"
        required
        pattern="[0-9]{10}"
      /><br />
      <input id="dob" type="date" required /><br />
      <input id="city" placeholder="City" required /><br />
      <input id="address" placeholder="Address" required /><br />

      <input id="username" placeholder="Username" required /><br />
      <input
        id="password"
        type="password"
        placeholder="Password"
        required
      /><br />

      <button type="submit">Register</button>
    </form>

    <script src="script.js"></script>
  </body>
</html>
