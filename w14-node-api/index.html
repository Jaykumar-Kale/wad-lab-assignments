<!doctype html>
<html>
  <head>
    <title>Users</title>
  </head>

  <body>
    <h2>User List</h2>

    <ul id="list"></ul>

    <script>
      fetch("http://localhost:3000/users")
        .then((res) => res.json())
        .then((data) => {
          let list = document.getElementById("list");

          data.forEach((user) => {
            let li = document.createElement("li");
            li.innerText = user.name + " - " + user.email;

            list.appendChild(li);
          });
        });
    </script>
  </body>
</html>
